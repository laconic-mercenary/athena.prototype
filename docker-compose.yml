services:
  runner:
    build: .
    stdin_open: true
    tty: true
    command:
      - athena
      - --config
      - /app/athena.yml
      - --instructions
      - /app/instructions.txt
      - --verbose
    volumes:
      - ./artifacts:/app/artifacts
    env_file: .env
    depends_on:
      target:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - athena-net

  target:
    build: ./target
    networks:
      - athena-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: "Sup3rS3cr3t!2024"
      POSTGRES_DB: sarif_prod
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      athena-net:
        aliases:
          - pgdatabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d sarif_prod"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  athena-net:
    driver: bridge
